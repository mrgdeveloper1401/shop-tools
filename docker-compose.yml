services:
  db:
    container_name: gs_db
    volumes:
      - gs_postgres_data:/var/lib/postgresql/data
    image: docker.arvancloud.ir/postgres:16.9-alpine
    expose:
      - 5432
    restart: always
    environment:
     POSTGRES_PASSWORD: ${COMPOSE_POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 10s

  redis:
    container_name: gs_redis
    image: redis:8-alpine
    restart: always
    command: >
      redis-server
      --loglevel warning
      --appendonly no
      --save ""
      --maxmemory 1024mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
    expose:
      - 6379
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 10s

  app:
    container_name: django
    build:
      context: .
      dockerfile: "dockerfile/prod/django/Dockerfile"
    ports:
      - "8000:8000"
    expose:
      - 8000
    env_file: "env_folder/.env"
    restart: always
    volumes:
      - static_files:/home/app/staticfiles

  nginx:
    container_name: gs_nginx
    restart: always
    volumes:
      - static_files:/vol/
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /etc/ssl:/etc/ssl:ro
    entrypoint: ["nginx", "-g", "daemon off;"]
    build:
      context: "dockerfile/prod/nginx/"
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app

  celery:
    container_name: gs_celery
    restart: always
    build:
      context: .
      dockerfile: "./dockerfile/prod/django/Dockerfile"
    env_file: "env_folder/.env"
    entrypoint: "celery -A core.utils.dj_celery worker -l INFO"
    dns:
      - 94.182.153.78
      - 2.188.21.130

  celery_beat:
    container_name: dj_celery_beat
    restart: always
    build:
      context: .
      dockerfile: "./dockerfile/prod/django/Dockerfile"
    env_file: "env_folder/.env"
    entrypoint: "celery -A core.utils.dj_celery beat -l INFO"

volumes:
  gs_postgres_data:
  static_files:
