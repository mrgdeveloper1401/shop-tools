user nginx;
worker_processes auto;

error_log /var/log/nginx/main_error.log warn buffer=32k flush=3600s;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
    accept_mutex off;
}

http {
    # upload file
    client_max_body_size 3M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;

    # timeout
    proxy_read_timeout 30s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    client_header_timeout 12s;

    # buffer
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 16k;
    proxy_request_buffering on;
    proxy_busy_buffers_size 32k;

    # type
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # log format in console
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" '
    '"$http_user_agent" "$http_x_forwarded_for"';

    # log
    access_log /var/log/nginx/access.log main buffer=32k flush=10s;

    sendfile on;
    tcp_nopush on; # send packet when buffer is full
    tcp_nodelay on; # send data without wait full buffer memory

    # keepalive
    keepalive_timeout 65; # open connection tcp
    types_hash_max_size 2048;
    keepalive_requests 1000;

    # comprossor
    gzip on;
    gzip_types {
        # text base
        text/plain
        text/css
        text/xml
        text/javascript
        text/html
        text/markdown
        text/csv

        # JSON APIs - DRF and drf-spectacular
        application/json
        application/ld+json
        application/vnd.api+json
        application/openapi+json
        application/swagger+json
        application/schema+json

        # JavaScript  Django Admin and static files
        application/javascript
        application/x-javascript

        # XML and feeds
        application/xml
        application/xml+rss
        application/atom+xml
        application/rss+xml

        # Django Admin and HTML
        application/xhtml+xml

        #  Whitenoise and static files
        font/woff
        font/woff2
        font/ttf
        font/otf
        application/font-woff
        application/font-woff2
        application/x-font-ttf
        application/vnd.ms-fontobject

        #  drf-spectacular-sidecar (Swagger UI)
        application/manifest+json
        application/webmanifest+json

        # other type
        application/yaml
        text/yaml
        application/x-yaml
        text/vtt
        application/vnd.ms-excel;
    }
    gzip_min_length 1000;
    gzip_comp_level 5;
    gzip_vary on;
    gzip_proxied any;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;

    # port 80
    server {
        listen 80;
        server_name api.gs-tools.ir;
        return 301 https://$host$request_uri;
    }

    # port 443
    server {
        listen 443 quic reuseport;
        listen 443 ssl;
        http3 on;
        http2 on;

        # server
        server_name api.gs-tools.ir;

        # ssl config
        ssl_certificate /etc/letsencrypt/archive/api.gs-tools.ir/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/archive/api.gs-tools.ir/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        # header
        add_header Alt-Svc 'h3=":443"; ma=86400, h3-29=":443"; ma=86400' always;

        # django static
        location /static/ {
            alias /vol/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
            gzip on;
            gzip_vary on;
            gzip_comp_level 5; # compress level
            gzip_min_length 1024; # compress more then 1Kb
            gzip_proxied any;
            gzip_types
                text/plain
                text/css
                text/html
                text/xml
                application/json
                application/javascript
                application/x-javascript
                application/xml
                application/xml+rss
                text/javascript
                image/svg+xml;
        }

        location / { 
            if ($host = "api.gs-tools.ir") {
                proxy_pass http://django:8000;

            }
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 443;
        }
    }

}
