user nginx;
worker_processes auto;

error_log /var/log/nginx/main_error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
    accept_mutex on; # set to in if nginx worker_proccess > 1
}

http {
    # upload file
    client_max_body_size 5M;
    client_body_buffer_size 256k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # timeout
    proxy_read_timeout 45s; # max time wait data for get response in backend
    proxy_connect_timeout 10s; # max time connect nginx into backend
    proxy_send_timeout 30s; # max time send send data nginx into backend
    client_header_timeout 30s;
    client_body_timeout 30s;
    send_timeout 30s;

    # proxy buffer
    proxy_buffering on; # get backend response after save in buffer afetr send into client
    proxy_buffer_size 16k; # first bufer size for send response into backend
    proxy_buffers 16 32k; # how many buffer number and buffer size (16 * 32 = 512), save 512kb response backend into memory
    proxy_request_buffering on; # get all file after send into backend
    proxy_busy_buffers_size 64k; # send buffer size into cleint

    # type
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # log format in console
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" '
    '"$http_user_agent" "$http_x_forwarded_for"';

    # log
    access_log /var/log/nginx/access.log main buffer=16k flush=5s;

    # performance
    sendfile on; # send file directly from dist into network
    tcp_nopush on; # send all packet (for big request)
    tcp_nodelay on; # send delivery packaet (for small request)
    sendfile_max_chunk 1m;

    # keepalive
    keepalive_timeout 5s; # open connection tcp
    keepalive_requests 1000; # max number of request in connection

    # comprossor
    gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    text/markdown
    text/csv
    application/json
    application/ld+json
    application/vnd.api+json
    application/openapi+json
    application/swagger+json
    application/schema+json
    application/javascript
    application/x-javascript
    application/xml
    application/xml+rss
    application/atom+xml
    application/rss+xml
    application/xhtml+xml
    application/x-font-ttf
    application/vnd.ms-fontobject
    application/manifest+json
    application/yaml
    text/yaml
    application/x-yaml
    text/vtt;

    gzip_min_length 1000;
    gzip_comp_level 5;
    gzip_vary on;
    gzip_proxied any;
    gzip_buffers 16 16k;
    gzip_http_version 1.1;

    upstream djangoApp {
        server django:8000;
        keepalive 64;
    }

    upstream nextjsApp {
        server front_gs_tools:3000;
        keepalive 100;
    }

    # port 80
    server {
        listen 80;
        server_name api.gs-tools.ir gs-tools.ir www.gs-tools.ir;
        return 301 https://$host$request_uri;
    }

    server {
        server_name gs-tools.ir www.gs-tools.ir;
        listen 443 ssl;
        http2 on;

        # ssl config
        ssl_certificate /etc/letsencrypt/self_signed/selfsigned.crt;
        ssl_certificate_key /etc/letsencrypt/self_signed/selfsigned.key;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        # header
        add_header Alt-Svc 'h3=":443"; ma=86400, h3-29=":443"; ma=86400' always;

        location / {
            proxy_pass http://nextjsApp;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
        }
    }

    #port 443 django
    server {
        server_name api.gs-tools.ir;
        listen 443 quic reuseport;
        listen 443 ssl;
        http3 on;
        http2 on;

        # ssl config
        ssl_certificate /etc/letsencrypt/self_signed/selfsigned.crt;
        ssl_certificate_key /etc/letsencrypt/self_signed/selfsigned.key;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        # header
        add_header Alt-Svc 'h3=":443"; ma=86400, h3-29=":443"; ma=86400' always;

        # django static
        location /static/ {
            alias /vol/;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location / {
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Port $server_port;

            # compatibility
            proxy_set_header X-Scheme $scheme;

            # prevent duplicate send header
            proxy_set_header Early-Data $ssl_early_data;

            # redirects we set the host: header above already
            proxy_redirect off;
            proxy_ignore_client_abort off; # close connection if user disconnect connecton
            proxy_pass http://djangoApp;
        }
    }
}
